[package]
name = "viking-sam-usb"
version = "0.1.0"
license = "MIT OR Apache-2.0"
edition = "2021"

# for cargo flash
[package.metadata]
chip = "ATSAMD21J18"

[dependencies.lilos]
git = "https://github.com/kevinmehall/lilos.git"
rev = "81c2fea2c9cdbcd05aa4de0eaddfdb65e179b3af"
default_features = false

[dependencies.cortex-m-rt]
version = "0.7"

[dependencies.cortex-m]
version = "0.7"
features = ["critical-section-single-core", "inline-asm"]

[dependencies.atsamd-hal]
git = "https://github.com/atsamd-rs/atsamd"
rev = "ecf2f583e15d4cadf798e31c7de425f6e6b89680"
default-features = false
features = ["samd21j-rt"]

[dependencies.usb]
git = "https://github.com/kevinmehall/rust-usb.git"
rev = "a343b6f3c9de025c365202a2301d46f51adf18bf"

[dependencies]
defmt = "0.3.6"
defmt-rtt = "0.4.0"
futures-util = { version = "0.3.30", default-features = false, features = ["async-await", "async-await-macro"] }
panic-probe = { version = "0.3" }
pin-project-lite = "0.2.14"
scopeguard = { version = "1.2.0", default_features = false }
viking-protocol = { path = "../viking/viking-protocol" }

[profile.dev]
incremental = false
codegen-units = 1
lto = true
opt-level = "z"

[profile.release]
debug = true
codegen-units = 1
lto = true
opt-level = "z"
