[package]
name = "sam0test"
version = "0.1.0"
license = "MIT OR Apache-2.0"
edition = "2021"

# for cargo flash
[package.metadata]
chip = "ATSAMD21J18A"

[dependencies.cortex-m-rt]
version = "0.7"

[dependencies.cortex-m]
version = "0.7"
features = ["critical-section-single-core", "inline-asm"]

[dependencies.atsamd-hal]
version = "0.16.0"
default-features = false
features = ["samd21j-rt"]

[dependencies]
embedded-graphics = "0.8.1"
panic-halt = "0.2"
ssd1306 = "0.8.4"

[profile.dev]
incremental = false
codegen-units = 1
lto = true
opt-level = "z"

[profile.release]
debug = true
codegen-units = 1
lto = true
opt-level = "z"
