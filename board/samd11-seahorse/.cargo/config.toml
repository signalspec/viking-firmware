[build]
target = "thumbv6m-none-eabi"

[target.thumbv6m-none-eabi]
runner = 'probe-rs run --chip ATSAMD11C14A --catch-hardfault'

rustflags = [
  "-C", "link-arg=--nmagic",

  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",

  "-C", "linker-plugin-lto=y",
  "-C", "lto=fat",

  "-Z", "macro-backtrace",
]