[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
runner = 'probe-rs run --chip RP235x --catch-hardfault'

rustflags = [
  "-C", "link-arg=--nmagic",

  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",

  "-C", "linker-plugin-lto=y",
  "-C", "lto=fat",

  "-Z", "macro-backtrace",
]
